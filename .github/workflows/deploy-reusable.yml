name: Deploy SST application

on:
  workflow_call:
    inputs:
      application:
        description: Workspace to deploy
        required: true
        type: string
      environment:
        description: GitHub environment and SST stage
        required: true
        type: string
      operation:
        description: deploy or remove
        required: true
        type: string
      role_arn:
        description: AWS IAM role assumed through GitHub OIDC
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: sst-${{ inputs.environment }}-${{ inputs.application }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate operation
        run: test "${{ inputs.operation }}" = deploy || test "${{ inputs.operation }}" = remove

      - name: Run SST operation
        run: pnpm sst:ws ${{ inputs.application }} ${{ inputs.operation }} -- --stage ${{ inputs.environment }}
