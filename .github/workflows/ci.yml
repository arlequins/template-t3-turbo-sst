name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  HUSKY: "0"

jobs:
  environment-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup
      - run: pnpm env:check

  generators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup
      - run: pnpm test:generators

  migration-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup
      - run: pnpm test:migration-upgrade

  database-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup
      - name: Test repository against isolated PostgreSQL
        run: pnpm test:integration

  template-portability:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Test runtime and template initializer
        run: pnpm test:runtime && pnpm test:template-init

  template-output:
    strategy:
      matrix:
        preset: [full, minimal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Qualify generated preset
        run: pnpm test:template-output ${{ matrix.preset }}

  template-feature-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./tooling/github/setup
      - name: Qualify pairwise feature combinations
        run: pnpm test:template-matrix

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Biome lint
        run: pnpm lint && pnpm lint:ws

      - name: Dead code and dependencies
        run: pnpm lint:dead-code

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Biome format
        run: pnpm format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Typecheck
        run: pnpm typecheck

  sst-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Validate SST without AWS credentials
        run: pnpm test:sst

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Copy env
        shell: bash
        run: cp .env.example .env

      - name: Test
        run: pnpm test

      - name: Check migrations
        run: pnpm db:check

  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build Storybook
        run: pnpm storybook:build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test browser authentication
        run: pnpm test:e2e
