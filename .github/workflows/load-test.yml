name: Baseline load test

on:
  workflow_dispatch:

concurrency:
  group: baseline-load-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  k6:
    environment: load-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Validate target
        env:
          API_URL: ${{ vars.LOAD_TEST_API_URL }}
        run: node -e 'const url = new URL(process.env.API_URL); if (url.protocol !== "https:") throw new Error("Load-test target must use HTTPS");'
      - uses: grafana/setup-k6-action@v1
      - uses: grafana/run-k6-action@v1
        env:
          API_URL: ${{ vars.LOAD_TEST_API_URL }}
        with:
          path: tests/load/api.js
